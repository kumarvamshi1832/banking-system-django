<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banking System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background: #0d2b45;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .nav {
            background: #ffffff;
            padding: 15px;
            text-align: center;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .nav a {
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
            color: #0d2b45;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav a:hover {
            background: #0d2b45;
            color: white;
        }

        .hero {
            text-align: center;
            margin-top: 80px;
        }

        .hero h2 {
            font-size: 30px;
            color: #333;
        }

        .hero p {
            color: #666;
            font-size: 18px;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0d2b45;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>

</head>
<body>

<div class="header">
    BANKING SYSTEM
</div>

<div class="nav">
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'accountcreate' %}">Create Account</a>
    <a href="{% url 'user_login' %}">Login</a>
</div>

<div class="hero">
    <h2>Welcome to  Banking Portal</h2>
    <p>Fast • Secure • Reliable Banking Services</p>
</div>

<div class="footer">
    © 2026 Banking System | All Rights Reserved
</div>

</body>
</html>
