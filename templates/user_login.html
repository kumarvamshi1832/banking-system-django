<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background: #0d2b45;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .card {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #0d2b45;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
        }

        td {
            padding: 10px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input:focus {
            border-color: #0d2b45;
            outline: none;
        }

        .btn {
            background: #0d2b45;
            color: white;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: #163a5f;
        }

        .msg {
            text-align: center;
            color: red;
            margin-bottom: 10px;
            font-weight: bold;
        }

    </style>

</head>
<body>

<div class="header">
    BANK LOGIN
</div>

<div class="container">

    <div class="card">

        <h2>Secure Login</h2>

        <div class="msg">{{ msg }}</div>

        <form method="post" action="{% url 'user_login' %}">
            {% csrf_token %}

            <table>

                <tr>
                    <td>User ID / Account No</td>
                    <td>
                        <input type="text" name="cid" required>
                    </td>
                </tr>

                <tr>
                    <td>Password</td>
                    <td>
                        <input type="password" name="pwd" required>
                    </td>
                </tr>

            </table>

            <br>
            <button type="submit" class="btn">LOGIN</button>

        </form>

    </div>

</div>

</body>
</html>
